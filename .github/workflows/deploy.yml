name: Build and Deploy ParkourWarrior

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Build the project and generate the single aggregated documentation
    - name: Build and Aggregate Docs
      run: ./gradlew clean build javadoc

    # Prepare the jar with git hash in filename
    - name: Rename Jar with Git Hash
      run: |
        JAR_FILE=$(ls build/libs/*.jar | head -1)
        SHORT_HASH="${GITHUB_SHA:0:7}"
        cp "$JAR_FILE" "build/libs/ParkourWarrior-${SHORT_HASH}.jar"

    - name: Deploy Javadocs via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "docs/*"
        target: "/var/webdocs/ParkourWarrior"
        strip_components: 1

    - name: Deploy Jar via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "build/libs/ParkourWarrior-*.jar"
        target: "/var/webdownloads/ParkourWarrior/nightly"
        strip_components: 2
